<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <title>Kronos — A private almanac</title>
    <meta name="title" content="Kronos — A private almanac" />
    <meta
      name="description"
      content="A private almanac of personal utilities — prayer times, currency, and forthcoming editions."
    />

    <meta name="theme-color" content="#f4ede0" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#161310" media="(prefers-color-scheme: dark)" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Kronos — A private almanac" />
    <meta
      property="og:description"
      content="A private almanac of personal utilities — prayer times, currency, and forthcoming editions."
    />

    <meta property="twitter:card" content="summary" />
    <meta property="twitter:title" content="Kronos — A private almanac" />
    <meta
      property="twitter:description"
      content="A private almanac of personal utilities — prayer times, currency, and forthcoming editions."
    />

    <script>
      (function () {
        try {
          var stored = localStorage.getItem("kronos_theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark = stored === "dark" || (stored !== "light" && prefersDark);
          if (isDark) document.documentElement.classList.add("dark");
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
