<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />

    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://api.fontshare.com/v2/css?f[]=editorial-new@400,500,400i,500i&f[]=mori@300,400,500,600&f[]=fraktion-mono@400&display=swap"
    />

    <title>Kronos — A private almanac</title>
    <meta name="title" content="Kronos — A private almanac" />
    <meta
      name="description"
      content="A private almanac of personal utilities — prayer times, currency, and forthcoming editions."
    />

    <meta name="theme-color" content="#f4ede0" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#161310" media="(prefers-color-scheme: dark)" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kronos" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Kronos — A private almanac" />
    <meta
      property="og:description"
      content="A private almanac of personal utilities — prayer times, currency, and forthcoming editions."
    />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Kronos — A private almanac" />
    <meta
      property="twitter:description"
      content="A private almanac of personal utilities — prayer times, currency, and forthcoming editions."
    />
    <meta property="twitter:image" content="/og.png" />

    <script>
      (function () {
        try {
          var stored = localStorage.getItem("kronos_theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark = stored === "dark" || (stored !== "light" && prefersDark);
          if (isDark) document.documentElement.classList.add("dark");
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
